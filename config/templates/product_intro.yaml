name: product_intro
description: "제품/서비스 소개 영상 (마케터 제이J 스타일)"

structure:
  - type: hook
    duration_range: [5, 10]
    description: "충격적 사실이나 질문으로 관심 끌기"

  - type: problem
    duration_range: [10, 15]
    description: "기존의 문제점/불편함 제시"

  - type: introduction
    duration_range: [10, 15]
    description: "솔루션으로서 제품 등장"

  - type: feature
    count: 3
    duration_range: [15, 25]
    description: "핵심 기능 소개 + 시각적 데모"

  - type: cta
    duration_range: [10, 15]
    description: "행동 유도 (사이트 방문, 구독 등)"

style:
  tone: "흥미 유발형, 스토리텔링 기반"
  narration_style: "자연스러운 구어체, 친근하지만 전문적"
  visual_style: "텍스트 카드 + 스크린 캡처 + 모션 그래픽"
  colors:
    primary: "#e94560"
    secondary: "#0f3460"
    background: "#1a1a2e"
    text: "#ffffff"
